# @package _global_
# DQN on CartPole replicating torchrl's SOTA reference
# (sota-implementations/dqn/config_cartpole.yaml).
# Key traits: small buffer (10k), 100 updates/batch, hard target update every
# 50 grad steps, lr=2.5e-4, 250k-frame epsilon anneal, MLP [120, 84].
defaults:
  - override /algorithm: dqn
  - override /environment: cartpole
  - override /logger: []
  - _self_

trainer:
  total_frames: 500_000
  seed: 42
  accelerator: cpu
  devices: [0]
  num_envs: 1

algorithm:
  frames_per_batch: 1_000
  init_random_frames: 10_000
  updates_per_step: 100
  replay_buffer:
    capacity: 10_000
    batch_size: 128
    storage: tensor
    prefetch: 3
  compile: true
  lr: 2.5e-4
  gamma: 0.99
  # SOTA does not clip gradients; set a very high threshold to effectively disable.
  max_grad_norm: 1.0e9
  # Hard target update every 50 gradient steps (tau=0 selects HardUpdate).
  tau: 0.0
  target_update_every: 50
  eps_annealing_frames: 250_000
  eps_end: 0.05
  network:
    architecture: mlp
    hidden_sizes: [120, 84]
    activation: relu
