# @package _global_
defaults:
  - override /algorithm: dqn
  - override /environment: atari_breakout
  - override /logger: []
  - _self_

trainer:
  total_frames: 10_000_000
  accelerator: gpu
  devices: [0]
  seed: 42

algorithm:
  frames_per_batch: 4
  init_random_frames: 50_000
  replay_buffer:
    capacity: 1_000_000
    batch_size: 32
  target_update_every: 10_000
  lr: 1e-4
  eps_annealing_frames: 1_000_000
  # Override network to CNN for pixel observations
  network:
    architecture: cnn_atari
    conv_channels: [32, 64, 64]
    conv_kernels: [8, 4, 3]
    conv_strides: [4, 2, 1]
    fc_hidden: [512]
    activation: relu
