# @package _global_
defaults:
  - override /algorithm: ppo
  - override /environment: dmc_humanoid
  - override /logger: []
  - _self_

trainer:
  total_frames: 10_000_000
  num_envs: 4
  accelerator: gpu
  devices: [0]
  seed: 42

algorithm:
  frames_per_batch: 2_048
  epochs_per_batch: 10
  minibatch_size: 256
  lr: 3e-4
  # Wider MLP with layer norm for continuous control
  network:
    architecture: mlp
    hidden_sizes: [400, 300]
    activation: elu
    layer_norm: true
