_target_: src.algorithms.dqn.DQNAlgorithm
# Default values and parameter descriptions: src/algorithms/dqn.py (DQNConfig)

# Data collection
frames_per_batch: 200
init_random_frames: 5_000

# Replay buffer
replay_buffer:
  capacity: 100_000
  batch_size: 128

# Optimization
lr: 1e-4
gamma: 0.99
max_grad_norm: 10.0
target_update_every: 1_000

# Exploration (epsilon-greedy)
eps_start: 1.0
eps_end: 0.05
eps_annealing_frames: 100_000

# Network architecture (MLP for CartPole; override to cnn_atari for Atari)
network:
  architecture: mlp
  hidden_sizes: [128, 128]
  activation: relu
  layer_norm: false
