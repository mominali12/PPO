_target_: src.algorithms.reinforce.ReinforceAlgorithm
# Default values and parameter descriptions: src/algorithms/reinforce.py (ReinforceConfig)

# Optimization
lr: 1e-3
gamma: 0.99
max_grad_norm: 0.5
normalize_returns: true

# Network architecture
network:
  architecture: mlp
  hidden_sizes: [64, 64]
  activation: tanh
  layer_norm: false
