_target_: src.algorithms.ppo.PPOAlgorithm
# Default values and parameter descriptions: src/algorithms/ppo.py (PPOAlgorithm.__init__)

# Data collection
frames_per_batch: 2_048

# PPO-specific
epochs_per_batch: 10
minibatch_size: 64
clip_epsilon: 0.2
entropy_coef: 0.01
critic_coef: 0.5
gamma: 0.99
lmbda: 0.95
max_grad_norm: 0.5

# Optimization
lr: 3e-4

# Network architecture (shared backbone for actor and critic)
network:
  architecture: mlp
  hidden_sizes: [256, 256]
  activation: tanh
  layer_norm: false
